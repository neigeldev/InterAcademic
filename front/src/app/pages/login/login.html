<div class="min-h-screen bg-gray-100 flex flex-col items-center justify-center px-4">

  <div class="bg-white rounded-2xl shadow-sm border border-gray-200 w-full max-w-lg p-8">

    <div class="flex justify-center mb-6">
      <img src="full.png" alt="InterAcademic" class="w-48" />
    </div>

    <h2 class="text-xl font-bold text-center text-gray-900 mb-6">Iniciar Sesión</h2>

    @if (error) {
      <div class="bg-red-50 text-red-600 px-4 py-3 rounded-lg mb-4 text-sm">
        {{ error }}
      </div>
    }

    <div class="mb-6">
      <label class="block text-sm font-semibold text-gray-800 mb-1">Correo Electrónico</label>
      <input
        type="email"
        [(ngModel)]="email"
        placeholder="Ingresa tu correo electrónico"
        class="w-full bg-gray-100 border-0 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-gray-400"
      />
    </div>

    <button
      (click)="login()"
      class="w-full bg-gray-900 text-white py-3 rounded-lg font-semibold hover:bg-[#4a82a6] transition">
      Iniciar Sesión
    </button>

    <p class="text-center text-sm text-gray-500 mt-4">
      ¿No tienes cuenta?
      <a routerLink="/register" class="text-gray-900 font-semibold hover:underline">Regístrate</a>
    </p>

  </div>
</div>
