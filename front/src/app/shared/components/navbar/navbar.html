@if (authService.isLoggedIn()) {
  <div class="fixed left-0 top-0 h-full w-56 bg-white border-r border-gray-200 flex flex-col p-4 shadow-sm z-50">

    <div class="mb-8">
      <img src="full.png" alt="InterAcademic" class="w-40" />
      <p class="text-xs text-gray-500 mt-2">{{ authService.getName() }}</p>
    </div>

    <nav class="flex flex-col gap-2 flex-1">
      <a routerLink="/courses"
        routerLinkActive="bg-gray-900 text-white"
        class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-gray-700 hover:bg-gray-100 transition">
        &#128218; Materias
      </a>
      <a routerLink="/dashboard"
        routerLinkActive="bg-gray-900 text-white"
        class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-gray-700 hover:bg-gray-100 transition">
        &#127891; Estudiantes
      </a>
    </nav>

    <button
      (click)="logout()"
      class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-red-500 hover:bg-red-50 transition mt-auto">
      &#128682; Cerrar sesión
    </button>

  </div>
}
